<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <title>KT Irene Studio</title>
  <link rel="stylesheet" href="/static/style.css?v=20260414-3"/>
</head>
<body>

<!-- ── 상단 툴바 ─────────────────────────────────────────────────────────── -->
<header class="topbar">
  <div class="topbar-left">
    <div class="logo-mark">KT</div>
    <span class="brand-name">Irene Studio</span>
    <span id="buildTag" class="build-tag">v0.3</span>
  </div>

  <div class="topbar-center">
    <button id="btnNew"      class="btn btn-primary">＋ 새 프로젝트</button>
    <button id="btnGenAll"   class="btn" disabled>▶ 전체 생성</button>
    <button id="btnRender"   class="btn" disabled>⬇ 최종 렌더</button>
    <a      id="btnDownload" class="btn btn-success hidden" download>⬇ 다운로드</a>
  </div>

  <div class="topbar-right">
    <label class="btn btn-ghost" title="아이린 레퍼런스 이미지 교체 (PNG/JPG)">
      📷 아이린 이미지
      <input type="file" id="ireneUpload" accept="image/*" style="display:none"/>
    </label>
    <div id="ttsStatus" class="status-pill">TTS 확인 중…</div>
  </div>
</header>

<!-- ── 생성 진행 바 ──────────────────────────────────────────────────────── -->
<div id="progressWrap" class="progress-wrap hidden">
  <div class="progress-inner">
    <span id="progressLabel">생성 중…</span>
    <div class="progress-track">
      <div id="progressFill" class="progress-fill" style="width:0%"></div>
    </div>
    <span id="progressPct">0%</span>
  </div>
</div>

<!-- ── 메인 워크스페이스 ─────────────────────────────────────────────────── -->
<main class="workspace">

  <!-- 왼쪽 사이드: 미리보기 + 타임라인 + 아이린 이미지 -->
  <aside class="side-pane">

    <div class="monitor-wrap">
      <video id="monitorVideo" class="monitor-video hidden"
             controls preload="metadata"></video>
      <div id="monitorPlaceholder" class="monitor-placeholder">
        <div class="placeholder-icon">🎬</div>
        <p>씬을 생성하면<br>여기서 바로 확인</p>
      </div>
    </div>

    <div class="side-section">
      <div class="section-title">클립 타임라인</div>
      <div id="timeline" class="timeline-track"></div>
    </div>

    <div class="side-section">
      <div class="section-title">아이린 레퍼런스</div>
      <div class="irene-wrap">
        <img id="irenePreview" src="/api/irene/reference" class="irene-img"
             onerror="this.style.display='none';document.getElementById('ireneFallback').style.display='flex'"
             alt="아이린"/>
        <div id="ireneFallback" class="irene-fallback" style="display:none">
          <span>📷</span>
          <small>아이린 이미지를 업로드하세요</small>
        </div>
      </div>
    </div>

  </aside>

  <!-- 오른쪽: 에디터 -->
  <section class="editor-pane">

    <!-- 프로젝트 설정 카드 -->
    <div class="card">
      <div class="card-header">
        <h2>프로젝트 설정</h2>
        <span id="projectStatus" class="status-pill pill-gray">프로젝트 없음</span>
      </div>

      <div class="form-row col3">
        <label>제목
          <input id="fTitle" value="오전 뉴스 브리핑" maxlength="80"/>
        </label>
        <label>템플릿
          <select id="fTemplate">
            <option value="A">A — 6:4 Split</option>
            <option value="B">B — PIP</option>
            <option value="C" selected>C — Anchor Full</option>
            <option value="D">D — Side Panel</option>
            <option value="E">E — Ticker</option>
            <option value="F">F — Dual Box</option>
          </select>
        </label>
        <label>씬 길이 (초)
          <input id="fTargetSec" type="number" min="5" max="10" value="8"/>
        </label>
      </div>

      <div class="form-row col4">
        <label>배경
          <select id="fBg">
            <option value="kt_studio">KT Studio (다크)</option>
            <option value="white_room">White Room</option>
            <option value="red_gradient">Red Gradient</option>
          </select>
        </label>
        <label>의상
          <select id="fOutfit">
            <option value="white_mockneck">White Mockneck</option>
            <option value="white_halter">White Halter</option>
          </select>
        </label>
        <label>헤어
          <select id="fHair">
            <option value="long_s_wave_6_4">Long S-wave 6:4</option>
            <option value="straight_6_4">Straight 6:4</option>
          </select>
        </label>
        <label>로고 위치
          <select id="fLogoPos">
            <option value="top-right">Top Right</option>
            <option value="top-left">Top Left</option>
            <option value="bottom-right">Bottom Right</option>
            <option value="bottom-left">Bottom Left</option>
          </select>
        </label>
      </div>

      <label>전체 대본
        <textarea id="fScript" rows="5"
          placeholder="뉴스 대본을 입력하세요. 씬은 자동으로 분할됩니다."></textarea>
      </label>
      <div class="char-hint">
        <span id="scriptCharCount">0자</span>
        <span class="meta"> · 씬 길이 기준 권장: 씬당 <span id="recommendedLimit">—</span>자</span>
      </div>
    </div>

    <!-- 씬 편집 카드 -->
    <div class="card">
      <div class="card-header">
        <h2>씬 편집</h2>
        <span id="sceneCount" class="meta">씬 없음</span>
      </div>
      <div id="sceneList"></div>
      <div id="emptyScenes" class="empty-state">
        <p>프로젝트를 생성하면 씬이 자동으로 분할됩니다</p>
      </div>
    </div>

  </section>
</main>

<!-- ── 토스트 알림 ──────────────────────────────────────────────────────── -->
<div id="toast" class="toast hidden"></div>

<script src="/static/app.js?v=20260414-3"></script>
</body>
</html>
